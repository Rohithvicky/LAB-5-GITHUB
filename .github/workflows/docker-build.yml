name: Docker Build

on:
  push:
    branches:
      - main
      - feature/DockerContainers
  workflow_dispatch:   # allows manual run from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./Dockers
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-python-app:latest

      # Step 4: Run container for test
      - name: Run container
        run: |
          docker run -d --name test-container ${{ secrets.DOCKERHUB_USERNAME }}/my-python-app:latest
          docker ps -a

      # Step 5: Stop container
      - name: Stop container
        run: docker stop test-container

      # Step 6: Remove container
        run: docker rm test-container
